<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علي أحمد السقا - مبرمج</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .title {
            font-size: 1.5em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .social-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 25px;
            display: inline-block;
            transition: all 0.3s;
        }
        .social-links a:hover {
            background: white;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>علي أحمد السقا</h1>
        <div class="title">مبرمج</div>
        
        <div class="card">
            <h2>مرحباً بكم في موقعي</h2>
            <p>أنا مبرمج شغوف بتطوير الحلول البرمجية المبتكرة</p>
        </div>

        <div class="card">
            <h2>المهارات</h2>
            <p>JavaScript | Python | HTML/CSS | React | Node.js</p>
        </div>

        <div class="social-links">
            <a href="https://github.com/">GitHub</a>
            <a href="https://linkedin.com/">LinkedIn</a>
            <a href="mailto:email@example.com">البريد الإلكتروني</a>
        </div>
    </div>
</body>
</html>
